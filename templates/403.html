{% extends "base.html" %}

{% block title %}{{ _('Access Denied') }}{% endblock %}

{% block content %}
<div class="text-center py-5">
    <h1 class="display-1">403</h1>
    <h2 class="mb-4">{{ _('Access Denied') }}</h2>
    <p class="mb-4">{{ _("You don't have permission to access this page.") }}</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">
        <i class="fas fa-home"></i> {{ _('Go Home') }}
    </a>
</div>
{% endblock %}
