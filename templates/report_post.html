{% extends "base.html" %}

{% block title %}{{ _('Report Post') }}{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fas fa-flag"></i> {{ _('Report Post') }}</h4>
            </div>
            <div class="card-body">
                <p>{{ _('You are reporting the post:') }} <strong>{{ post.title }}</strong></p>
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="reason" class="form-label">{{ _('Reason for reporting') }}</label>
                        <textarea name="reason" class="form-control" rows="5" required
                                  placeholder="{{ _('Please provide details about why this post violates community guidelines...') }}"></textarea>
                        <small class="text-muted">{{ _('Clear, specific reports help admins review content faster.') }}</small>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('posts.view_post', post_id=post.id) }}" class="btn btn-secondary">{{ _('Cancel') }}</a>
                        <button type="submit" class="btn btn-danger">{{ _('Submit Report') }}</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
