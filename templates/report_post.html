{% extends "base.html" %}

{% block title %}Report Post{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-6 mx-auto">
        <div class="card">
            <div class="card-header bg-warning">
                <h4 class="mb-0"><i class="fas fa-flag"></i> Report Post</h4>
            </div>
            <div class="card-body">
                <p>You are reporting the post: <strong>{{ post.title }}</strong></p>
                <form method="POST">
                    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
                    <div class="mb-3">
                        <label for="reason" class="form-label">Reason for reporting</label>
                        <textarea name="reason" class="form-control" rows="5" required
                                  placeholder="Please provide details about why this post violates community guidelines..."></textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('view_post', post_id=post.id) }}" class="btn btn-secondary">Cancel</a>
                        <button type="submit" class="btn btn-danger">Submit Report</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
